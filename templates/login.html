<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RootSentry — Login</title>
  <meta name="description" content="RootSentry secure dashboard login."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080f08;--card:#0d180d;
      --border:#1a3a1a;--border2:#22482a;
      --text:#d0ecd0;--text2:#7aaa7a;--dim:#3a5c3a;
      --accent:#00ff88;--ag:rgba(0,255,136,.08);--ab:rgba(0,255,136,.25);
      --danger:#ff4f4f;--dg:rgba(255,79,79,.1);--db:rgba(255,79,79,.3);
    }

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      position:relative;
      overflow:hidden;
    }

    /* Animated background grid */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,255,136,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.03) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }

    /* Radial glow behind card */
    body::after{
      content:'';
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:600px;height:600px;
      background:radial-gradient(circle, rgba(0,255,136,.06) 0%, transparent 70%);
      pointer-events:none;
      z-index:0;
    }

    .login-wrap{
      position:relative;
      z-index:1;
      width:100%;
      max-width:420px;
    }

    /* Logo / branding above card */
    .brand{
      text-align:center;
      margin-bottom:28px;
    }
    .brand-icon{
      width:56px;height:56px;
      background:var(--ag);
      border:1px solid var(--ab);
      border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 14px;
      animation:pulse 3s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.2)}
      50%{box-shadow:0 0 0 10px rgba(0,255,136,0)}
    }
    .brand-icon svg{color:var(--accent)}
    .brand-name{
      font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:-0.5px;
    }
    .brand-name span{color:var(--accent)}
    .brand-sub{
      font-size:.72rem;color:var(--dim);
      font-family:'JetBrains Mono',monospace;
      margin-top:4px;letter-spacing:.08em;
    }

    /* Card */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:36px 32px;
      box-shadow:0 24px 60px rgba(0,0,0,.4);
    }

    .card-title{
      font-size:.68rem;font-weight:700;
      color:var(--dim);text-transform:uppercase;letter-spacing:.1em;
      margin-bottom:24px;text-align:center;
    }

    /* Error banner */
    .error-banner{
      background:var(--dg);
      border:1px solid var(--db);
      border-radius:8px;
      padding:10px 14px;
      margin-bottom:20px;
      display:flex;align-items:center;gap:9px;
      font-size:.81rem;color:var(--danger);font-weight:500;
      animation:shake .35s ease;
    }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }
    .error-icon{flex-shrink:0;font-size:1rem}

    /* Form fields */
    .field{margin-bottom:18px}
    .field-label{
      display:block;
      font-size:.65rem;font-weight:700;
      color:var(--dim);text-transform:uppercase;letter-spacing:.08em;
      margin-bottom:7px;
    }
    .field-wrap{position:relative}
    .field-icon{
      position:absolute;left:12px;top:50%;transform:translateY(-50%);
      color:var(--dim);pointer-events:none;
      transition:color .2s;
    }
    .field-wrap:focus-within .field-icon{color:var(--accent)}

    input[type="text"],
    input[type="password"]{
      width:100%;
      padding:11px 14px 11px 38px;
      background:#040a04;
      border:1px solid var(--border);
      border-radius:9px;
      color:var(--text);
      font-family:'JetBrains Mono',monospace;
      font-size:.85rem;
      outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(0,255,136,.1);
    }
    input::placeholder{color:var(--dim)}

    /* Toggle password visibility */
    .toggle-pw{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:var(--dim);padding:2px;
      transition:color .2s;
    }
    .toggle-pw:hover{color:var(--accent)}

    /* Submit button */
    .btn-login{
      width:100%;
      padding:13px;
      background:var(--accent);
      color:#080f08;
      border:none;
      border-radius:9px;
      font-family:'Inter',sans-serif;
      font-size:.88rem;
      font-weight:800;
      cursor:pointer;
      letter-spacing:.02em;
      transition:all .2s;
      margin-top:6px;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-login:hover{
      background:#00e07a;
      transform:translateY(-1px);
      box-shadow:0 6px 20px rgba(0,255,136,.25);
    }
    .btn-login:active{transform:translateY(0)}

    /* Loading state */
    .btn-login.loading{
      background:#005535;color:#7aaa7a;cursor:not-allowed;transform:none;box-shadow:none;
    }
    .spin{
      width:14px;height:14px;
      border:2px solid rgba(0,0,0,.2);
      border-top-color:#080f08;
      border-radius:50%;
      animation:spin .6s linear infinite;
      display:none;
    }
    .btn-login.loading .spin{display:block}
    .btn-login.loading .btn-text{display:none}

    @keyframes spin{to{transform:rotate(360deg)}}

    /* Footer note */
    .login-note{
      text-align:center;
      margin-top:22px;
      font-size:.7rem;color:var(--dim);
      font-family:'JetBrains Mono',monospace;
    }
    .login-note span{
      display:inline-block;
      width:6px;height:6px;
      border-radius:50%;
      background:var(--accent);
      margin-right:5px;
      vertical-align:middle;
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* Divider */
    .divider{
      height:1px;background:var(--border);
      margin:24px 0;
    }

    .version{
      text-align:center;font-size:.65rem;
      color:var(--dim);font-family:'JetBrains Mono',monospace;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Branding -->
  <div class="brand">
    <div class="brand-icon">
      <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path stroke-linecap="round" d="m9 12 2 2 4-4"/>
      </svg>
    </div>
    <div class="brand-name">Root<span>Sentry</span></div>
    <div class="brand-sub">Linux Rootkit Detection Engine</div>
  </div>

  <!-- Login card -->
  <div class="card">
    <div class="card-title">Secure Dashboard Access</div>

    {% if error %}
    <div class="error-banner">
      <span class="error-icon">⚠</span>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" id="login-form" autocomplete="on">
      <!-- Username -->
      <div class="field">
        <label class="field-label" for="username">Username</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </span>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="admin"
            autocomplete="username"
            required
            value="{{ request.form.get('username', '') }}"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path stroke-linecap="round" d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" id="toggle-pw" title="Show/hide password" aria-label="Toggle password visibility">
            <svg id="eye-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <div class="spin"></div>
        <span class="btn-text">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px">
            <path stroke-linecap="round" d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Sign In
        </span>
      </button>
    </form>

    <div class="divider"></div>
    <div class="version">RootSentry v1.0 &nbsp;·&nbsp; session-based auth</div>
  </div>

  <div class="login-note">
    <span></span>Detection engine online — awaiting authentication
  </div>

</div>

<script>
  /* Toggle password visibility */
  const toggleBtn = document.getElementById('toggle-pw');
  const pwInput   = document.getElementById('password');
  const eyeIcon   = document.getElementById('eye-icon');

  const eyeOpen  = `<path stroke-linecap="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed= `<path stroke-linecap="round" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  let visible = false;
  toggleBtn.addEventListener('click', () => {
    visible = !visible;
    pwInput.type = visible ? 'text' : 'password';
    eyeIcon.innerHTML = visible ? eyeClosed : eyeOpen;
  });

  /* Loading state on submit */
  document.getElementById('login-form').addEventListener('submit', () => {
    const btn = document.getElementById('btn-login');
    btn.classList.add('loading');
  });

  /* Auto-focus username (or password if username already filled) */
  window.addEventListener('DOMContentLoaded', () => {
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    if (u.value) { p.focus(); } else { u.focus(); }
  });
</script>
</body>
</html>
