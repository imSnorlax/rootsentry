<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RootSentry — Authenticate</title>
  <meta name="description" content="RootSentry secure dashboard authentication."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --void:#050914;--glass:rgba(8,14,30,0.8);
      --border:rgba(0,240,255,0.1);--border2:rgba(0,240,255,0.22);
      --cyan:#00F0FF;--amber:#FFB000;--red:#FF2A55;--green:#00FF9F;
      --text:#C8D8E8;--text2:#5A7A9A;--text3:#7A9AB8;
    }
    html,body{height:100%}
    body{
      font-family:'Inter',sans-serif;
      background:var(--void);color:var(--text);
      display:flex;align-items:center;justify-content:center;
      padding:20px;min-height:100vh;overflow:hidden;position:relative;
    }
    /* Animated void */
    .void-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
    .void-bg::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 60% 60% at 30% 30%, rgba(0,240,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 70% 70%, rgba(255,42,85,0.03) 0%, transparent 60%);
    }
    .grid{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(0,240,255,0.025) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(0,240,255,0.025) 1px,transparent 1px);
      background-size:50px 50px;
      mask-image:radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 100%);
    }
    /* Center glow */
    .center-glow{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      width:500px;height:500px;
      background:radial-gradient(circle, rgba(0,240,255,0.05) 0%, transparent 70%);
      pointer-events:none;z-index:0;
      animation:glow-pulse 4s ease-in-out infinite;
    }
    @keyframes glow-pulse{0%,100%{opacity:.6}50%{opacity:1}}

    .login-wrap{position:relative;z-index:1;width:100%;max-width:420px}

    /* Brand */
    .brand{text-align:center;margin-bottom:28px}
    .brand-icon{
      width:64px;height:64px;
      background:linear-gradient(135deg,rgba(0,240,255,0.15),rgba(0,240,255,0.05));
      border:1px solid var(--border2);border-radius:16px;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 14px;color:var(--cyan);
      box-shadow:0 0 30px rgba(0,240,255,0.2),inset 0 1px 0 rgba(255,255,255,0.06);
      animation:icon-pulse 3s ease-in-out infinite;
    }
    @keyframes icon-pulse{
      0%,100%{box-shadow:0 0 20px rgba(0,240,255,0.2)}
      50%{box-shadow:0 0 40px rgba(0,240,255,0.4),0 0 60px rgba(0,240,255,0.1)}
    }
    .brand-name{font-size:1.8rem;font-weight:900;color:#fff;letter-spacing:-1px}
    .brand-name span{color:var(--cyan);text-shadow:0 0 20px rgba(0,240,255,0.5)}
    .brand-sub{font-size:.62rem;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:5px;letter-spacing:.12em}

    /* Card */
    .card{
      background:var(--glass);
      backdrop-filter:blur(24px) saturate(1.4);
      -webkit-backdrop-filter:blur(24px) saturate(1.4);
      border:1px solid var(--border2);border-radius:18px;
      padding:36px 32px;
      box-shadow:0 0 0 1px rgba(0,240,255,0.04),0 24px 60px rgba(0,0,0,.7),
                 0 0 60px rgba(0,240,255,0.06),inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .card-title{
      font-size:.6rem;font-weight:700;color:var(--text2);
      text-transform:uppercase;letter-spacing:.15em;
      margin-bottom:24px;text-align:center;
    }

    /* Error */
    .error-banner{
      background:rgba(255,42,85,0.08);border:1px solid rgba(255,42,85,0.3);
      border-radius:9px;padding:11px 14px;margin-bottom:20px;
      display:flex;align-items:center;gap:9px;
      font-size:.8rem;color:var(--red);font-weight:500;
      animation:shake .35s ease;
    }
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

    /* Fields */
    .field{margin-bottom:18px}
    .field-label{
      display:block;font-size:.6rem;font-weight:700;
      color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;
    }
    .field-wrap{position:relative}
    .field-icon{
      position:absolute;left:13px;top:50%;transform:translateY(-50%);
      color:var(--text2);pointer-events:none;transition:color .2s;
    }
    .field-wrap:focus-within .field-icon{color:var(--cyan)}
    input[type="text"],input[type="password"]{
      width:100%;padding:12px 14px 12px 40px;
      background:rgba(0,0,0,0.4);
      border:1px solid var(--border);border-radius:10px;
      color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85rem;
      outline:none;transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,240,255,0.08)}
    input::placeholder{color:var(--text2);opacity:.5}
    .toggle-pw{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:var(--text2);transition:color .2s;
    }
    .toggle-pw:hover{color:var(--cyan)}

    /* Submit */
    .btn-login{
      width:100%;padding:13px;margin-top:6px;
      background:linear-gradient(135deg,var(--cyan),rgba(0,190,220,0.85));
      color:#040c1a;border:none;border-radius:10px;
      font-family:'Inter',sans-serif;font-size:.88rem;font-weight:900;
      cursor:pointer;letter-spacing:.04em;
      display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 0 20px rgba(0,240,255,0.3),0 4px 12px rgba(0,0,0,.4);
      transition:all .2s;
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,240,255,0.5),0 8px 20px rgba(0,0,0,.4)}
    .btn-login:active{transform:translateY(0)}
    .btn-login.loading{background:rgba(0,240,255,0.1);color:var(--cyan);cursor:not-allowed;transform:none;box-shadow:none;border:1px solid rgba(0,240,255,0.2)}
    .spin{width:14px;height:14px;border:2px solid rgba(0,240,255,0.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .6s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-login.loading .spin{display:block}
    .btn-login.loading .btn-text{display:none}

    /* Divider */
    .divider{height:1px;background:var(--border);margin:24px 0}
    .version{text-align:center;font-size:.6rem;color:var(--text2);font-family:'JetBrains Mono',monospace}

    /* Footer note */
    .login-note{
      text-align:center;margin-top:20px;
      font-size:.62rem;color:var(--text2);font-family:'JetBrains Mono',monospace;
      display:flex;align-items:center;justify-content:center;gap:7px;
    }
    .note-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 5px var(--cyan);animation:pulse-dot 2s infinite}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
<div class="void-bg"></div>
<div class="grid"></div>
<div class="center-glow"></div>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path stroke-linecap="round" d="m9 12 2 2 4-4"/>
      </svg>
    </div>
    <div class="brand-name">Root<span>Sentry</span></div>
    <div class="brand-sub">LINUX ROOTKIT DETECTION ENGINE</div>
  </div>

  <div class="card">
    <div class="card-title">⬡ Secure Dashboard Access</div>

    {% if error %}
    <div class="error-banner">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" id="login-form" autocomplete="on">
      <div class="field">
        <label class="field-label" for="username">Operator ID</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </span>
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required value="{{ request.form.get('username','') }}"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Access Key</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" class="toggle-pw" id="toggle-pw" title="Show/hide">
            <svg id="eye-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <div class="spin"></div>
        <span class="btn-text">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><path stroke-linecap="round" d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
          AUTHENTICATE
        </span>
      </button>
    </form>

    <div class="divider"></div>
    <div class="version">RootSentry v1.0 · session-based auth · TLS recommended</div>
  </div>

  <div class="login-note">
    <span class="note-dot"></span>
    Detection engine online — awaiting authentication
  </div>
</div>

<script>
  const toggleBtn=document.getElementById('toggle-pw');
  const pwInput=document.getElementById('password');
  const eyeIcon=document.getElementById('eye-icon');
  const eyeOpen=`<path stroke-linecap="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed=`<path stroke-linecap="round" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  let visible=false;
  toggleBtn.addEventListener('click',()=>{visible=!visible;pwInput.type=visible?'text':'password';eyeIcon.innerHTML=visible?eyeClosed:eyeOpen;});
  document.getElementById('login-form').addEventListener('submit',()=>document.getElementById('btn-login').classList.add('loading'));
  window.addEventListener('DOMContentLoaded',()=>{const u=document.getElementById('username');const p=document.getElementById('password');if(u.value)p.focus();else u.focus();});
</script>
</body>
</html>
